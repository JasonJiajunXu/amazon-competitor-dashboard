name: Deploy competitor dashboard to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build static bundle
        run: |
          mkdir -p dist
          cp -R site/. dist/
          mkdir -p dist/data
          cp data/reports.csv dist/data/reports.csv
          cp data/hero_stats.csv dist/data/hero_stats.csv
          cp data/monthly_series.csv dist/data/monthly_series.csv
          cp data/insights.csv dist/data/insights.csv
          cp data/refresh_status.json dist/data/refresh_status.json
          cp data/sellersprite_status.json dist/data/sellersprite_status.json
          cp data/sellersprite_daily.json dist/data/sellersprite_daily.json
          cp data/dragy_dashboard.json dist/data/dragy_dashboard.json

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: Deploy competitor dashboard to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "metabase_dashboard_pack/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build static bundle
        run: |
          mkdir -p dist
          cp -R site/. dist/
          mkdir -p dist/data
          cp data/dashboard.json dist/data/dashboard.json
          cp data/reports.csv dist/data/reports.csv
          cp data/monthly_series.csv dist/data/monthly_series.csv

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

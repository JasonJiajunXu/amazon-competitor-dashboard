<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jason 销量情报板</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css?v=20260506k">
</head>
<body class="home-body">
  <div class="shell">
    <header class="topbar home-topbar">
      <div class="home-hero">
        <div class="home-hero-main">
          <div class="home-brand-chip">
            <img class="brand-logo" src="./assets/brand/jason-logo.png" alt="Jason">
            <div class="home-brand-copy">
              <p class="topbar-label">Jason Intelligence</p>
              <span class="home-brand-note">Amazon device tracking</span>
            </div>
          </div>
          <div class="home-title-block">
            <h1>销量情报板</h1>
            <p class="home-hero-description">
              用一个入口快速判断今天哪个产品线值得看，再进入对应看板查看全球销量、国家拆分和历史趋势。
            </p>
          </div>
        </div>
        <div class="topbar-meta home-topbar-meta">
          <div class="meta-badge">
            <span>数据源</span>
            <strong>Amazon · SellerSprite</strong>
            <em class="meta-footnote">Daily tracking · shareable dashboard</em>
          </div>
        </div>
      </div>
    </header>

    <main class="home-layout">
      <section class="entry-panel">
        <div class="panel-heading">
          <p class="kicker">Boards</p>
          <h2>按运动类型进入具体产品</h2>
        </div>
        <div class="entry-grid" id="entry-grid"></div>
      </section>

      <aside class="status-panel">
        <div class="panel-heading">
          <p class="kicker">Refresh Status</p>
          <h2>数据更新时间</h2>
        </div>

        <div class="status-highlight">
          <div class="status-label">最近一次更新时间</div>
          <div class="status-time" id="last-updated">-</div>
          <div class="status-subline" id="last-updated-note">-</div>
        </div>

        <div class="status-stack">
          <div class="status-card">
            <span>跟踪产品数</span>
            <strong id="tracked-report-count">-</strong>
          </div>
          <div class="status-card">
            <span>已配置 ASIN</span>
            <strong id="configured-asin-count">-</strong>
          </div>
          <div class="status-card">
            <span>已整理月度数据</span>
            <strong id="tracked-series-count">-</strong>
          </div>
          <div class="status-card">
            <span>待补标识产品</span>
            <strong id="pending-report-count">-</strong>
          </div>
        </div>

        <div class="status-log">
          <div class="status-log-title">更新记录</div>
          <div id="refresh-log"></div>
        </div>
      </aside>
    </main>
  </div>

  <script src="./data-loader.js?v=20260506k"></script>
  <script src="./home.js?v=20260506k"></script>
</body>
</html>

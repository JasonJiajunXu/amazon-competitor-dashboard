<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dragy 全球销量看板</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
</head>
<body class="report-body">
  <div class="shell">
    <header class="topbar report-topbar">
      <div class="brand-lockup">
        <a class="back-link" href="./index.html">返回入口</a>
        <div>
          <p class="topbar-label">Dragy Intelligence Board</p>
          <h1>dragy 销量情报板</h1>
        </div>
      </div>
      <div class="topbar-meta">
        <div class="meta-badge">
          <span>最近刷新</span>
          <strong id="dragy-last-updated">-</strong>
        </div>
      </div>
    </header>

    <main class="report-layout">
      <section class="product-hero-card" id="dragy-hero-card"></section>

      <section class="detail-card">
        <div class="panel-heading compact">
          <p class="kicker">View Switcher</p>
          <h2>先看全部产品，再切到单产品</h2>
        </div>
        <div class="product-chooser" id="dragy-scope-tabs"></div>
      </section>

      <section class="summary-strip" id="dragy-summary"></section>

      <section class="detail-card comparison-panel" id="dragy-comparison-panel">
        <div class="visual-head">
          <div>
            <p class="kicker">Portfolio Read</p>
            <h2>全部产品模式下，先看 5 个产品的角色分布</h2>
          </div>
        </div>
        <div class="visual-grid" id="dragy-line-cards"></div>
      </section>

      <section class="detail-card">
        <div class="visual-head">
          <div>
            <p class="kicker">Recent 30 Days</p>
            <h2>最近 30 天每天销量</h2>
          </div>
        </div>
        <div class="daily-strip" id="dragy-recent-metrics"></div>
        <canvas id="dragy-recent-chart"></canvas>
        <div class="table-wrap" id="dragy-recent-table"></div>
      </section>

      <section class="detail-card">
        <div class="visual-head">
          <div>
            <p class="kicker">Monthly Explorer</p>
            <h2>近一年月销量，点月份看当月每天</h2>
          </div>
        </div>
        <canvas id="dragy-monthly-chart"></canvas>
        <div class="month-chip-row" id="dragy-month-chips"></div>
        <div class="daily-strip" id="dragy-month-metrics"></div>
        <canvas id="dragy-month-daily-chart"></canvas>
        <div class="table-wrap" id="dragy-month-daily-table"></div>
      </section>

      <section class="detail-columns">
        <article class="detail-card wide">
          <div class="visual-head">
            <div>
              <p class="kicker">World View</p>
              <h2>真实世界地图 + 国家销量表</h2>
            </div>
          </div>
          <div class="map-shell">
            <div class="atlas-map" id="dragy-map-board"></div>
            <div class="table-wrap" id="dragy-country-table"></div>
          </div>
        </article>

        <aside class="detail-sidebar">
          <section class="detail-card">
            <div class="panel-heading compact">
              <p class="kicker">Brand Image</p>
              <h2>主视觉</h2>
            </div>
            <div id="dragy-image-panel"></div>
          </section>

          <section class="detail-card">
            <div class="panel-heading compact">
              <p class="kicker">Tracked Products</p>
              <h2>当前产品覆盖</h2>
            </div>
            <div id="dragy-product-list"></div>
          </section>

          <section class="detail-card">
            <div class="panel-heading compact">
              <p class="kicker">Design Notes</p>
              <h2>这页怎么读</h2>
            </div>
            <div id="dragy-notes"></div>
          </section>
        </aside>
      </section>
    </main>
  </div>

  <script src="./dragy-data.js"></script>
  <script src="./dragy.js"></script>
</body>
</html>

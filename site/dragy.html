<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dragy 全球近 30 天销量看板</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
</head>
<body class="report-body">
  <div class="shell">
    <header class="topbar report-topbar">
      <div class="brand-lockup">
        <a class="back-link" href="./index.html">返回入口</a>
        <div>
          <p class="topbar-label">Dragy Global</p>
          <h1>dragy 全球近 30 天销量看板</h1>
        </div>
      </div>
      <div class="topbar-meta">
        <div class="meta-badge">
          <span>最近刷新</span>
          <strong id="dragy-last-updated">-</strong>
        </div>
      </div>
    </header>

    <main class="report-layout">
      <section class="product-hero-card" id="dragy-hero-card"></section>

      <section class="summary-strip" id="dragy-summary"></section>

      <section class="daily-sales-section">
        <article class="visual-card">
          <div class="visual-head">
            <div>
              <p class="kicker">Country Totals</p>
              <h3>近 30 天各国家销量总览</h3>
            </div>
          </div>
          <div class="daily-strip" id="dragy-daily-strip"></div>
          <canvas id="dragy-country-chart"></canvas>
        </article>

        <article class="detail-card">
          <div class="panel-heading compact">
            <p class="kicker">Market Mix</p>
            <h2>国家入口卡片</h2>
          </div>
          <div class="country-card-grid" id="dragy-country-cards"></div>
        </article>
      </section>

      <section class="visual-grid">
        <article class="visual-card">
          <div class="visual-head">
            <div>
              <p class="kicker">Daily Trend</p>
              <h3>近 30 天国家日销量走势</h3>
            </div>
          </div>
          <canvas id="dragy-trend-chart"></canvas>
        </article>

        <article class="detail-card">
          <div class="panel-heading compact">
            <p class="kicker">Coverage</p>
            <h2>本次统计口径</h2>
          </div>
          <div id="dragy-notes"></div>
        </article>
      </section>

      <section class="detail-columns">
        <article class="detail-card wide">
          <div class="panel-heading compact">
            <p class="kicker">Country Table</p>
            <h2>国家销量明细</h2>
          </div>
          <div class="table-wrap" id="dragy-country-table"></div>
        </article>

        <aside class="detail-sidebar">
          <section class="detail-card">
            <div class="panel-heading compact">
              <p class="kicker">Product Image</p>
              <h2>品牌主图</h2>
            </div>
            <div id="dragy-image-panel"></div>
          </section>

          <section class="detail-card">
            <div class="panel-heading compact">
              <p class="kicker">Tracked Products</p>
              <h2>追踪产品清单</h2>
            </div>
            <div id="dragy-product-list"></div>
          </section>
        </aside>
      </section>

      <section class="detail-card">
        <div class="panel-heading compact">
          <p class="kicker">Daily Matrix</p>
          <h2>近 30 天全球日销量矩阵</h2>
        </div>
        <div class="table-wrap" id="dragy-daily-table"></div>
      </section>
    </main>
  </div>

  <script src="./dragy.js"></script>
</body>
</html>
